<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico Interactivo Personalizado</title>
    
    <!-- 1. Importamos la fuente Poppins desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- 2. Importamos la librería de gráficos Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h2 {
            font-weight: 600;
            font-size: 1.2rem;
            color: #1e293b;
            margin-bottom: 5px;
            text-align: center;
        }
        p {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <h2>Rendimiento por Categoría</h2>
        <p>Gráfico HTML interactivo con tipografía personalizada</p>
        <!-- El lienzo donde se pintará el gráfico -->
        <canvas id="miGrafico"></canvas>
    </div>

    <script>
        // 3. Configuración y datos del gráfico
        const ctx = document.getElementById('miGrafico').getContext('2d');
        
        const miGrafico = new Chart(ctx, {
            type: 'bar', // Tipo de gráfico: barras
            data: {
                labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
                datasets: [{
                    label: 'Métricas Actuales',
                    data: [12, 19, 3, 5, 2, 3],
                    backgroundColor: 'rgba(54, 162, 235, 0.8)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1,
                    borderRadius: 6 // Esquinas redondeadas en las barras
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            // Aplicamos la fuente personalizada a la leyenda
                            font: {
                                family: 'Poppins',
                                size: 12
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: '#f1f5f9'
                        },
                        ticks: {
                            font: { family: 'Poppins' }
                        }
                    },
                    x: {
                        grid: { display: false },
                        ticks: {
                            font: { family: 'Poppins' }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
